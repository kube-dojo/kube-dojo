  Anchor extraction performed via curl + pdftotext + ocrmypdf on directly verified
  primary-source PDFs:

   - Turing 1950 Mind paper "Computing Machinery and Intelligence":
     courses.cs.umbc.edu/471/papers/turing.pdf — `pdftotext` extracted §1
     imitation-game definition (p. 433), §1 teleprinter passage (p. 433), §1
     "machine takes part of A" pivot (p. 434), §2 decoupling argument (p. 434),
     §3-§5 digital-computer reframe (pp. 436-442), §6 opening 10^9 prediction
     (p. 442), §6 "end of century" companion claim (p. 442), §6.6 Lady Lovelace
     + §7 supercritical-mind opening (pp. 450-455), §7 child-machine programme
     (pp. 454-456), §7 evolution analogy (p. 456), §7 chess-vs-sense-organs
     bifurcation (p. 460), §7 closing line "we can only see a short distance
     ahead" (p. 460). Note: courses.cs.umbc.edu PDF header reads "Mind 49"
     which is a transcription error — correct volume is 59 (LIX), confirmed by
     Saygin 2000 cross-citation.

   - Turing 1948 NPL report "Intelligent Machinery" (in Ince ed. 1992,
     Mechanical Intelligence vol. 1): weightagnostic.github.io/papers/turing1948.pdf
     was image-only; processed via `ocrmypdf` (Tesseract 5.5.2) then `pdftotext`.
     OCR is good but imperfect (Tesseract flagged "lots of diacritics"). NPL
     inner pagination [1]-[13] preserved alongside Mechanical Intelligence
     volume pagination [107]-[127]. Anchored: five-objections-and-refutation
     (NPL [1]-[3]), unorganized A-type machines + cortex (NPL [5]-[10]),
     paper-vs-screwdriver interference + education by rewards/punishments
     (NPL [7]-[8]), and **the two-room chess proto-imitation experiment
     on NPL inner p. [13]** ("c may find it quite difficult to tell which
     he is playing"). The 1948 chess experiment is the operational shape of
     the Imitation Game arriving 2 years before the Mind paper.

   - Turing 1947 LMS lecture: vordenker.de/downloads/turing-vorlesung.pdf
     (seminarTEXT transcription, Eberhard von Goldammer ss 2000). `pdftotext`
     extracted the 10^10 bit brain-capacity estimate (seminarTEXT p. 6 +
     pp. 12-13), the "fair play for the machine" / infallibility-incompatible-
     with-intelligence argument (pp. 13-14), and the chess-as-testbed proposal
     (p. 14). Standard print citation: Carpenter & Doran 1986, A. M. Turing's
     ACE Report of 1946 and Other Papers, MIT Press, pp. 106-124. Carpenter-
     Doran sub-page anchors pending physical-edition access (Q3 in
     open-questions.md).

   - Saygin et al 2000 "Turing Test: 50 Years Later": crl.ucsd.edu/~saygin/
     papers/MMTT.pdf. `pdftotext` extracted §2.4 Turing's Predictions on
     Saygin journal pp. 472-473 with explicit cross-citation
     `(Turing, 1950, p. 442)` confirming the Mind §6 opening anchor. Section
     structure of §3-§5 verified at pp. 473-513; specific named-author claims
     within not yet extracted (Q9 in open-questions.md).

   - Proudfoot 2011 "Anthropomorphism and AI": Crossref API verification only.
     Citation metadata anchored at the volume/page-range level (DOI
     10.1016/j.artint.2011.01.006, AI 175 (5-6), pp. 950-957). Article is
     paywalled; specific page anchors pending (Q2 in open-questions.md).

