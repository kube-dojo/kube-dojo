site_name: KubeDojo
site_description: Free, comprehensive cloud native education
site_url: https://kube-dojo.github.io/
repo_url: https://github.com/kube-dojo/kube-dojo.github.io
repo_name: kube-dojo/kube-dojo.github.io
docs_dir: docs
theme:
  name: material
  palette:
  - scheme: slate
    primary: deep purple
    accent: amber
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  - scheme: default
    primary: deep purple
    accent: amber
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  features:
  - navigation.tabs
  - navigation.indexes
  - navigation.top
  - navigation.path
  - navigation.tracking
  - navigation.prune
  - search.suggest
  - search.highlight
  - content.code.copy
  - content.code.annotate
  - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  language: en
plugins:
- search
- i18n:
    default_language: en
    docs_structure: suffix
    languages:
    - locale: en
      default: true
      name: English
      build: true
    - locale: uk
      default: false
      name: Українська
      build: true
      nav_translations:
        Home: Головна
        What's New: Що нового
        Fundamentals: Основи
        Zero to Terminal: Від нуля до терміналу
        Philosophy & Design: Філософія та дизайн
        Cloud Native 101: Cloud Native 101
        Kubernetes Basics: Основи Kubernetes
        Modern DevOps: Сучасний DevOps
        Linux Deep Dive: Linux поглиблено
        Everyday Use: Щоденне використання
        System Essentials: Системні основи
        Container Primitives: Контейнерні примітиви
        Networking: Мережі
        Security Hardening: Зміцнення безпеки
        Performance: Продуктивність
        Troubleshooting: Усунення несправностей
        Shell Scripting: Скриптування
        System Administration: Системне адміністрування
        Cloud: Хмарні технології
        Certifications: Сертифікації
        Platform Engineering: Платформна інженерія
        Foundations: Основи
        Toolkits: Інструменти
        Disciplines: Дисципліни
markdown_extensions:
- pymdownx.highlight:
    anchor_linenums: true
    line_spans: __span
    pygments_lang_class: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences
- pymdownx.details
- pymdownx.tabbed:
    alternate_style: true
- admonition
- tables
- attr_list
- md_in_html
- toc:
    permalink: true
extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/krisztiankoos/kubedojo
  alternate:
  - name: English
    link: /
    lang: en
  - name: Українська
    link: /uk/
    lang: uk
copyright: MIT License - Free to use, share, and modify
